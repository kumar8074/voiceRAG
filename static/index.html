<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceRAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #e8e8e8;
      height: 100vh; display: flex; overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════════ */
    #sidebar {
      width: 260px; min-width: 260px; background: #111;
      border-right: 1px solid #1e1e1e;
      display: flex; flex-direction: column; overflow: hidden;
    }

    #sidebar-header {
      padding: 16px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
    }
    .brand { font-size: 1.05rem; font-weight: 700; letter-spacing: .3px; margin-bottom: 12px; }
    .brand span { color: #2f6ef5; }

    #new-chat-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
      background: #2f6ef5; border: none; border-radius: 10px;
      padding: 9px 14px; font-size: .85rem; color: #fff; cursor: pointer;
      transition: background .15s;
    }
    #new-chat-btn:hover { background: #1a5ce0; }
    #new-chat-btn:disabled { background: #1e3a6e; cursor: not-allowed; opacity: .6; }

    /* Session list */
    #session-list {
      flex: 1; overflow-y: auto; padding: 8px;
      scrollbar-width: thin; scrollbar-color: #222 transparent;
    }
    .session-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer;
      transition: background .15s; margin-bottom: 2px;
    }
    .session-item:hover { background: #1a1a1a; }
    .session-item.active { background: #1a2a4a; border: 1px solid #2f4a8f; }
    .session-item .s-icon { font-size: 1rem; flex-shrink: 0; }
    .session-item .s-info { flex: 1; overflow: hidden; }
    .session-item .s-title {
      font-size: .82rem; color: #ccc; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .session-item .s-date { font-size: .72rem; color: #555; margin-top: 2px; }
    .session-item .s-del {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: .8rem; padding: 2px 4px; border-radius: 4px;
      transition: color .15s, background .15s; flex-shrink: 0; opacity: 0;
    }
    .session-item:hover .s-del { opacity: 1; }
    .session-item .s-del:hover { color: #e55; background: #2a1a1a; }

    /* Documents section in sidebar */
    #docs-section {
      border-top: 1px solid #1e1e1e; flex-shrink: 0; padding: 10px 8px;
    }
    #docs-section .docs-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 6px 8px; font-size: .75rem; color: #555; text-transform: uppercase;
      letter-spacing: .6px;
    }
    #docs-section .upload-btn {
      background: none; border: 1px solid #2e2e2e; border-radius: 6px;
      padding: 3px 8px; font-size: .72rem; color: #666; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    #docs-section .upload-btn:hover { color: #aaa; border-color: #555; }
    #docs-section .upload-btn:disabled { opacity: .4; cursor: not-allowed; }

    .doc-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; border-radius: 8px; font-size: .8rem; color: #aaa;
      transition: background .15s;
    }
    .doc-item:hover { background: #1a1a1a; }
    .doc-item .doc-name {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-item .doc-del {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: .8rem; padding: 2px 5px; border-radius: 4px;
      transition: color .15s, background .15s; opacity: 0;
    }
    .doc-item:hover .doc-del { opacity: 1; }
    .doc-item .doc-del:hover { color: #e55; background: #2a1a1a; }
    .doc-item .doc-indexing {
      width: 10px; height: 10px; border: 1.5px solid #2f6ef5;
      border-top-color: transparent; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    #no-docs { padding: 6px 8px; font-size: .78rem; color: #444; font-style: italic; }

    /* ═══════════════════════════════════════════════════
       MAIN CHAT AREA
    ═══════════════════════════════════════════════════ */
    #chat-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Top bar */
    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid #1e1e1e;
      background: #111; flex-shrink: 0;
    }
    #session-title { font-size: .9rem; color: #aaa; font-weight: 500; }

    /* Chat window */
    #main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 20px 16px; overflow: hidden;
    }

    #chat-window {
      width: 100%; max-width: 760px; flex: 1; overflow-y: auto;
      padding: 24px 0 12px; display: flex; flex-direction: column;
      gap: 14px; scrollbar-width: thin; scrollbar-color: #333 transparent;
    }

    .msg { display: flex; align-items: flex-start; max-width: 80%; animation: fadeUp .2s ease; }
    .msg.user   { align-self: flex-end;  flex-direction: row-reverse; }
    .msg.bot    { align-self: flex-start; }
    .msg.system { align-self: flex-start; max-width: 100%; }

    .bubble {
      padding: 10px 14px; border-radius: 18px;
      line-height: 1.6; font-size: .92rem; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user   .bubble { background: #2f6ef5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot    .bubble { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.system .bubble {
      background: #161616; color: #666; font-size: .8rem;
      border-radius: 10px; border: 1px solid #222;
    }

    .bubble.streaming::after {
      content: '▍'; display: inline-block;
      animation: blink .7s steps(1) infinite; margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .file-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px; padding: 4px 10px; font-size: .78rem; color: #ccc;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Indexing banner */
    #indexing-banner {
      display: none; width: 100%; max-width: 760px;
      background: #1a1a2e; border: 1px solid #2f6ef5;
      border-radius: 12px; padding: 10px 16px; margin-bottom: 8px;
      font-size: .85rem; color: #7eb3ff;
      align-items: center; gap: 10px;
    }
    #indexing-banner.show { display: flex; }
    #indexing-banner .spinner {
      width: 14px; height: 14px; border: 2px solid #2f6ef5;
      border-top-color: transparent; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Preview bar */
    #preview-bar {
      width: 100%; max-width: 760px; display: none;
      flex-wrap: wrap; gap: 8px; padding: 8px 0 4px;
    }
    .preview-chip {
      display: flex; align-items: center; gap: 6px;
      background: #1c1c1e; border: 1px solid #333;
      border-radius: 20px; padding: 5px 10px; font-size: .8rem; color: #ccc;
    }
    .preview-chip button {
      background: none; border: none; cursor: pointer;
      color: #888; font-size: 14px; line-height: 1; padding: 0;
    }
    .preview-chip button:hover { color: #e55; }

    /* Input bar */
    #input-bar {
      width: 100%; max-width: 760px; background: #1a1a1a;
      border: 1px solid #2e2e2e; border-radius: 24px;
      display: flex; align-items: flex-end; padding: 8px 8px 8px 14px;
      gap: 6px; transition: border-color .2s, opacity .2s;
    }
    #input-bar:focus-within { border-color: #2f6ef5; }
    #input-bar.disabled { opacity: .45; pointer-events: none; }

    #msg-input {
      flex: 1; background: none; border: none; outline: none; color: #e8e8e8;
      font-size: .95rem; resize: none; min-height: 24px; max-height: 160px;
      line-height: 1.5; padding: 4px 0; align-self: center;
    }
    #msg-input::placeholder { color: #555; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%; background: none; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #666; transition: background .15s, color .15s; flex-shrink: 0;
    }
    .icon-btn:hover { background: #2a2a2a; color: #aaa; }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%; background: #2f6ef5; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0; transition: background .15s, transform .1s;
    }
    #send-btn:hover   { background: #1a5ce0; }
    #send-btn:active  { transform: scale(.92); }
    #send-btn:disabled { background: #2a2a2a; cursor: default; }
    #file-input { display: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #222; border: 1px solid #333; border-radius: 12px;
      padding: 8px 18px; font-size: .82rem; color: #ccc;
      opacity: 0; pointer-events: none; transition: opacity .25s;
      white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; }

    .recording { color: #e55 !important; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: .4; } }

    /* Empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: #333; font-size: .9rem; pointer-events: none;
    }
    #empty-state .e-icon { font-size: 2.5rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  </style>
</head>
<body>

<!-- ═══════ SIDEBAR ═══════ -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="brand">Voice<span>RAG</span></div>
    <button id="new-chat-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>
  </div>

  <div id="session-list"></div>

  <!-- Documents for current session -->
  <div id="docs-section">
    <div class="docs-header">
      <span>Documents</span>
      <button class="upload-btn" id="sidebar-upload-btn"
              onclick="document.getElementById('file-input').click()">+ Upload</button>
    </div>
    <div id="doc-list"><div id="no-docs">No documents uploaded yet.</div></div>
  </div>
</div>

<!-- ═══════ MAIN AREA ═══════ -->
<div id="chat-area">
  <div id="top-bar">
    <span id="session-title">New Chat</span>
  </div>

  <div id="main">
    <div id="chat-window"></div>

    <div id="indexing-banner">
      <div class="spinner"></div>
      <span id="indexing-msg">📄 Reading documents… please wait.</span>
    </div>

    <div id="preview-bar"></div>

    <div id="input-bar">
      <button class="icon-btn" id="attach-btn" title="Attach PDF"
              onclick="document.getElementById('file-input').click()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8"  y1="12" x2="16" y2="12"/>
        </svg>
      </button>
      <input type="file" id="file-input" multiple accept=".pdf" />

      <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>

      <button class="icon-btn" id="voice-btn" title="Voice (coming soon)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8"  y1="22" x2="16" y2="22"/>
        </svg>
      </button>

      <button id="send-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  IDENTITY — user_id persists forever, session_id resets
//             on every page load AND every New Chat click
// ═══════════════════════════════════════════════════════════
function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function getOrCreate(key, generator) {
  let val = localStorage.getItem(key);
  if (!val) { val = generator(); localStorage.setItem(key, val); }
  return val;
}

// user_id — persists across reloads (same user forever)
const userId = getOrCreate('voicerag_user_id', generateId);

// session_id — fresh on every page load
let sessionId = generateId();

// ═══════════════════════════════════════════════════════════
//  SESSION STORE — kept in localStorage
//  { id, title, createdAt, messages: [], docs: [] }
// ═══════════════════════════════════════════════════════════
function getSessions() {
  return JSON.parse(localStorage.getItem('voicerag_sessions') || '[]');
}
function saveSessions(sessions) {
  localStorage.setItem('voicerag_sessions', JSON.stringify(sessions));
}
function getCurrentSession() {
  return getSessions().find(s => s.id === sessionId);
}
function upsertSession(patch) {
  const sessions = getSessions();
  const idx = sessions.findIndex(s => s.id === sessionId);
  if (idx === -1) {
    sessions.unshift({ id: sessionId, title: 'New Chat',
                       createdAt: Date.now(), messages: [], docs: [], ...patch });
  } else {
    sessions[idx] = { ...sessions[idx], ...patch };
  }
  saveSessions(sessions);
}
function deleteSession(sid) {
  const sessions = getSessions().filter(s => s.id !== sid);
  saveSessions(sessions);
}

// ═══════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════
const chatWindow     = document.getElementById('chat-window');
const msgInput       = document.getElementById('msg-input');
const fileInput      = document.getElementById('file-input');
const previewBar     = document.getElementById('preview-bar');
const sendBtn        = document.getElementById('send-btn');
const voiceBtn       = document.getElementById('voice-btn');
const newChatBtn     = document.getElementById('new-chat-btn');
const toast          = document.getElementById('toast');
const inputBar       = document.getElementById('input-bar');
const indexingBanner = document.getElementById('indexing-banner');
const indexingMsg    = document.getElementById('indexing-msg');
const sessionList    = document.getElementById('session-list');
const docList        = document.getElementById('doc-list');
const sessionTitle   = document.getElementById('session-title');
const sidebarUpload  = document.getElementById('sidebar-upload-btn');

let selectedFiles = [];
let isStreaming   = false;
let isIndexing    = false;
let isRecording   = false;
let pollTimer     = null;

// ═══════════════════════════════════════════════════════════
//  INIT — create session for this page load, render sidebar
// ═══════════════════════════════════════════════════════════
function init() {
  upsertSession({});           // register this fresh session
  renderSidebar();
  renderDocList();
  renderChatWindow();
  updateSessionTitle();
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR — session threads
// ═══════════════════════════════════════════════════════════
function renderSidebar() {
  const sessions = getSessions();
  sessionList.innerHTML = '';

  if (sessions.length === 0) {
    sessionList.innerHTML = '<div style="padding:12px 10px;font-size:.78rem;color:#444;">No sessions yet.</div>';
    return;
  }

  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session-item' + (s.id === sessionId ? ' active' : '');
    el.innerHTML = `
      <span class="s-icon">💬</span>
      <div class="s-info">
        <div class="s-title">${escHtml(s.title)}</div>
        <div class="s-date">${formatDate(s.createdAt)}</div>
      </div>
      <button class="s-del" title="Delete session" onclick="handleDeleteSession(event,'${s.id}')">🗑</button>`;
    el.addEventListener('click', () => switchSession(s.id));
    sessionList.appendChild(el);
  });
}

function switchSession(sid) {
  if (sid === sessionId) return;
  if (isIndexing) { showToast('⏳ Wait for indexing to finish.'); return; }

  sessionId = sid;
  renderSidebar();
  renderDocList();
  renderChatWindow();
  updateSessionTitle();
}

function handleDeleteSession(e, sid) {
  e.stopPropagation();
  deleteSession(sid);
  if (sid === sessionId) startNewChat();
  else { renderSidebar(); renderDocList(); }
}

function updateSessionTitle() {
  const s = getCurrentSession();
  sessionTitle.textContent = s ? s.title : 'New Chat';
}

// ═══════════════════════════════════════════════════════════
//  CHAT WINDOW — render messages for current session
// ═══════════════════════════════════════════════════════════
function renderChatWindow() {
  chatWindow.innerHTML = '';
  const s = getCurrentSession();
  const msgs = s ? s.messages : [];

  if (msgs.length === 0) {
    chatWindow.innerHTML = `
      <div id="empty-state">
        <div class="e-icon">🎙️</div>
        <div>Upload a PDF or send a message to get started.</div>
      </div>`;
    return;
  }

  msgs.forEach(m => {
    const wrap = document.createElement('div');
    wrap.className = `msg ${m.role}`;
    wrap.innerHTML = `<div class="bubble">${m.role === 'user' ? escHtml(m.content) : m.content}</div>`;
    chatWindow.appendChild(wrap);
  });
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function persistMessage(role, content) {
  const s = getCurrentSession() || { messages: [] };
  s.messages.push({ role, content });

  // Auto-title from first user message
  if (role === 'user' && s.messages.filter(m => m.role === 'user').length === 1) {
    s.title = content.slice(0, 40) + (content.length > 40 ? '…' : '');
  }

  upsertSession({ messages: s.messages, title: s.title });
  updateSessionTitle();
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════
//  DOCUMENT LIST — per session
// ═══════════════════════════════════════════════════════════
function renderDocList() {
  const s = getCurrentSession();
  const docs = s ? (s.docs || []) : [];
  docList.innerHTML = '';

  if (docs.length === 0) {
    docList.innerHTML = '<div id="no-docs">No documents uploaded yet.</div>';
    return;
  }

  docs.forEach(d => {
    const el = document.createElement('div');
    el.className = 'doc-item';
    el.id = `doc-${d.doc_id}`;
    el.innerHTML = `
      <span>📄</span>
      <span class="doc-name" title="${escHtml(d.filename)}">${truncate(d.filename, 22)}</span>
      ${d.status === 'indexing'
        ? '<div class="doc-indexing"></div>'
        : `<button class="doc-del" title="Delete document"
             onclick="handleDeleteDoc(event,'${d.doc_id}')">🗑</button>`}`;
    docList.appendChild(el);
  });
}

function addDocToSession(doc) {
  const s = getCurrentSession() || { docs: [] };
  const docs = s.docs || [];
  docs.push(doc);
  upsertSession({ docs });
  renderDocList();
}

function updateDocStatus(doc_id, status) {
  const s = getCurrentSession();
  if (!s) return;
  const docs = (s.docs || []).map(d => d.doc_id === doc_id ? { ...d, status } : d);
  upsertSession({ docs });
  renderDocList();
}

function removeDocFromSession(doc_id) {
  const s = getCurrentSession();
  if (!s) return;
  const docs = (s.docs || []).filter(d => d.doc_id !== doc_id);
  upsertSession({ docs });
  renderDocList();
}

async function handleDeleteDoc(e, doc_id) {
  e.stopPropagation();
  if (!confirm('Delete this document from your knowledge base?')) return;

  try {
    const res = await fetch(`/api/v1/document/${doc_id}?user_id=${encodeURIComponent(userId)}`,
                            { method: 'DELETE' });
    if (res.ok) {
      removeDocFromSession(doc_id);
      showToast('🗑 Document deleted.');
    } else {
      const data = await res.json().catch(() => ({}));
      showToast(`❌ Delete failed: ${data.detail || 'Unknown error'}`);
    }
  } catch (err) {
    showToast(`❌ Network error: ${err.message}`);
  }
}

// ═══════════════════════════════════════════════════════════
//  INDEXING STATE
// ═══════════════════════════════════════════════════════════
function setIndexing(state) {
  isIndexing = state;
  inputBar.classList.toggle('disabled', state);
  indexingBanner.classList.toggle('show', state);
  newChatBtn.disabled = state;
  sidebarUpload.disabled = state;
  toggleSend();
}

function pollIndexStatus(jobId, docs) {
  clearInterval(pollTimer);

  pollTimer = setInterval(async () => {
    try {
      const res  = await fetch(`/api/v1/index-status/${jobId}`);
      const data = await res.json();

      if (data.status === 'done') {
        clearInterval(pollTimer);
        setIndexing(false);

        // Update doc statuses from job result
        (data.docs || []).forEach(d => updateDocStatus(d.doc_id, 'ready'));

        appendSystemMsg('✅ Documents ready! You can now ask questions about them.');
        showToast('✅ Documents indexed!');

      } else if (data.status === 'error') {
        clearInterval(pollTimer);
        setIndexing(false);
        docs.forEach(d => updateDocStatus(d.doc_id, 'error'));
        appendSystemMsg(`❌ Indexing failed: ${data.detail}`);
        showToast('❌ Indexing failed.');
      }
    } catch (err) {
      clearInterval(pollTimer);
      setIndexing(false);
      appendSystemMsg(`❌ Could not check indexing status: ${err.message}`);
    }
  }, 2000);
}

// ═══════════════════════════════════════════════════════════
//  NEW CHAT
// ═══════════════════════════════════════════════════════════
function startNewChat() {
  sessionId = generateId();
  upsertSession({});
  renderSidebar();
  renderDocList();
  renderChatWindow();
  updateSessionTitle();
  selectedFiles = []; renderPreview(); toggleSend();
}

newChatBtn.addEventListener('click', () => {
  if (isIndexing) { showToast('⏳ Wait for indexing to finish.'); return; }
  startNewChat();
});

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = msgInput.scrollHeight + 'px';
  toggleSend();
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trySend(); }
});

const MAX_FILES = 3, MAX_SIZE = 50 * 1024 * 1024;

fileInput.addEventListener('change', () => {
  const incoming = Array.from(fileInput.files), errors = [], valid = [];
  for (const f of incoming) {
    if (selectedFiles.length + valid.length >= MAX_FILES) {
      errors.push(`Max ${MAX_FILES} files allowed.`); break;
    }
    if (f.size > MAX_SIZE)                         { errors.push(`"${f.name}" exceeds 5 MB.`); continue; }
    if (!f.name.toLowerCase().endsWith('.pdf'))    { errors.push(`"${f.name}" is not a PDF.`); continue; }
    valid.push(f);
  }
  if (errors.length) showToast(errors[0]);
  selectedFiles.push(...valid); fileInput.value = ''; renderPreview(); toggleSend();
});

function renderPreview() {
  previewBar.innerHTML = '';
  previewBar.style.display = selectedFiles.length ? 'flex' : 'none';
  selectedFiles.forEach((f, i) => {
    const chip = document.createElement('div'); chip.className = 'preview-chip';
    chip.innerHTML = `📄 <span>${truncate(f.name, 22)}</span>
                      <button onclick="removeFile(${i})">✕</button>`;
    previewBar.appendChild(chip);
  });
}

function removeFile(i) { selectedFiles.splice(i, 1); renderPreview(); toggleSend(); }
function toggleSend() {
  sendBtn.disabled = isStreaming || isIndexing ||
                     !(msgInput.value.trim() || selectedFiles.length);
}

sendBtn.addEventListener('click', trySend);

async function trySend() {
  if (isStreaming || isIndexing) return;
  const text  = msgInput.value.trim();
  const files = [...selectedFiles];
  if (!text && !files.length) return;

  // Remove empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  msgInput.value = ''; msgInput.style.height = 'auto';
  selectedFiles = []; renderPreview(); toggleSend();

  if (files.length) {
    appendUserMsg(text, files.map(f => f.name));
    await uploadFiles(files);
    if (text) showToast('💬 Send your question once indexing completes.');
  } else {
    appendUserMsg(text);
    persistMessage('user', text);
    await sendQuery(text);
  }
}

// ═══════════════════════════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════════════════════════
async function uploadFiles(files) {
  const fd = new FormData();
  files.forEach(f => fd.append('files', f));
  fd.append('user_id', userId);
  fd.append('session_id', sessionId);

  // Add docs to sidebar immediately as "indexing"
  files.forEach(f => addDocToSession({
    doc_id: 'pending_' + generateId(),
    filename: f.name,
    status: 'indexing'
  }));

  try {
    const res  = await fetch('/api/v1/upload', { method: 'POST', body: fd });
    const data = await res.json();

    if (!res.ok) {
      appendSystemMsg(`❌ ${data.detail || 'Upload failed.'}`);
      return;
    }

    // Replace pending docs with real doc_ids once we get them from status
    // For now mark all as indexing — poll will update with real doc_ids
    setIndexing(true);
    indexingMsg.textContent =
      `📄 Reading ${files.length > 1 ? files.length + ' documents' : '"' + files[0].name + '"'}… please wait.`;

    // Rebuild doc list from server response once indexing done
    pollIndexStatus(data.job_id, files);

  } catch (err) {
    appendSystemMsg(`❌ Network error: ${err.message}`);
    setIndexing(false);
  }
}

// ═══════════════════════════════════════════════════════════
//  STREAMING QUERY
// ═══════════════════════════════════════════════════════════
async function sendQuery(text) {
  isStreaming = true; toggleSend();

  const botWrap   = document.createElement('div'); botWrap.className = 'msg bot';
  const botBubble = document.createElement('div'); botBubble.className = 'bubble streaming';
  botWrap.appendChild(botBubble);
  chatWindow.appendChild(botWrap);
  chatWindow.scrollTop = chatWindow.scrollHeight;

  let fullResponse = '';

  try {
    const res = await fetch('/api/v1/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: text, user_id: userId, session_id: sessionId, top_k: 5
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      botBubble.textContent = `❌ ${err.detail || 'Something went wrong.'}`;
      botBubble.classList.remove('streaming');
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const token = decoder.decode(value, { stream: true });
      fullResponse += token;
      botBubble.textContent += token;
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Persist bot response
    persistMessage('bot', escHtml(fullResponse));

  } catch (err) {
    botBubble.textContent = `❌ Network error: ${err.message}`;
  } finally {
    botBubble.classList.remove('streaming');
    isStreaming = false; toggleSend();
  }
}

// ═══════════════════════════════════════════════════════════
//  VOICE
// ═══════════════════════════════════════════════════════════
voiceBtn.addEventListener('click', () => {
  isRecording = !isRecording;
  voiceBtn.classList.toggle('recording', isRecording);
  showToast(isRecording ? '🎙 Recording… (not yet implemented)' : 'Recording stopped.');
});

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function appendUserMsg(text, fileNames = []) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const wrap = document.createElement('div'); wrap.className = 'msg user';
  let html = text ? `<span>${escHtml(text)}</span>` : '';
  if (fileNames.length)
    html += `<div class="file-chips">${fileNames.map(n =>
      `<span class="chip">📄 ${truncate(n, 24)}</span>`).join('')}</div>`;
  wrap.innerHTML = `<div class="bubble">${html}</div>`;
  chatWindow.appendChild(wrap);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function appendSystemMsg(text) {
  const wrap = document.createElement('div'); wrap.className = 'msg system';
  wrap.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chatWindow.appendChild(wrap);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
         ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
init();
</script>
