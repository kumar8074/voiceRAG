<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #e8e8e8;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; padding: 16px;
    }

    #chat-window {
      width: 100%; max-width: 760px; flex: 1; overflow-y: auto;
      padding: 24px 0 12px; display: flex; flex-direction: column;
      gap: 14px; scrollbar-width: thin; scrollbar-color: #333 transparent;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 80%; animation: fadeUp .2s ease; }
    .msg.user   { align-self: flex-end;  flex-direction: row-reverse; }
    .msg.system { align-self: flex-start; }

    .bubble { padding: 10px 14px; border-radius: 18px; line-height: 1.5; font-size: .92rem; }
    .msg.user .bubble   { background: #2f6ef5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.system .bubble { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; }

    .file-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px; padding: 4px 10px; font-size: .78rem; color: #ccc;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    #preview-bar {
      width: 100%; max-width: 760px; display: none; flex-wrap: wrap; gap: 8px; padding: 8px 0 4px;
    }
    .preview-chip {
      display: flex; align-items: center; gap: 6px;
      background: #1c1c1e; border: 1px solid #333;
      border-radius: 20px; padding: 5px 10px; font-size: .8rem; color: #ccc;
    }
    .preview-chip button {
      background: none; border: none; cursor: pointer;
      color: #888; font-size: 14px; line-height: 1; padding: 0; transition: color .15s;
    }
    .preview-chip button:hover { color: #e55; }

    #input-bar {
      width: 100%; max-width: 760px; background: #1a1a1a;
      border: 1px solid #2e2e2e; border-radius: 24px;
      display: flex; align-items: flex-end; padding: 8px 8px 8px 14px;
      gap: 6px; transition: border-color .2s;
    }
    #input-bar:focus-within { border-color: #2f6ef5; }

    #msg-input {
      flex: 1; background: none; border: none; outline: none; color: #e8e8e8;
      font-size: .95rem; resize: none; min-height: 24px; max-height: 160px;
      line-height: 1.5; padding: 4px 0; align-self: center;
    }
    #msg-input::placeholder { color: #555; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%; background: none; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #666; transition: background .15s, color .15s; flex-shrink: 0;
    }
    .icon-btn:hover { background: #2a2a2a; color: #aaa; }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%; background: #2f6ef5; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0; transition: background .15s, transform .1s;
    }
    #send-btn:hover  { background: #1a5ce0; }
    #send-btn:active { transform: scale(.92); }
    #send-btn:disabled { background: #2a2a2a; cursor: default; }
    #file-input { display: none; }

    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #222; border: 1px solid #333; border-radius: 12px;
      padding: 8px 18px; font-size: .82rem; color: #ccc;
      opacity: 0; pointer-events: none; transition: opacity .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    .recording { color: #e55 !important; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: .4; } }
  </style>
</head>
<body>

  <div id="chat-window">
    <div class="msg system">
      <div class="bubble">👋 Hello! Send a message or upload up to 3 files (max 5 MB each).</div>
    </div>
  </div>

  <div id="preview-bar"></div>

  <div id="input-bar">
    <button class="icon-btn" id="attach-btn" title="Attach files"
            onclick="document.getElementById('file-input').click()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8"  y1="12" x2="16" y2="12"/>
      </svg>
    </button>
    <input type="file" id="file-input" multiple accept="*/*" />

    <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>

    <button class="icon-btn" id="voice-btn" title="Voice message (coming soon)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
    </button>

    <button id="send-btn" title="Send" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="toast"></div>

  <script>
    const MAX_FILES = 3, MAX_SIZE = 5 * 1024 * 1024, API_URL = '/api/v1/upload';
    const chatWindow = document.getElementById('chat-window');
    const msgInput   = document.getElementById('msg-input');
    const fileInput  = document.getElementById('file-input');
    const previewBar = document.getElementById('preview-bar');
    const sendBtn    = document.getElementById('send-btn');
    const voiceBtn   = document.getElementById('voice-btn');
    const toast      = document.getElementById('toast');
    let selectedFiles = [], isRecording = false;

    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = msgInput.scrollHeight + 'px';
      toggleSend();
    });
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); trySend(); }
    });

    fileInput.addEventListener('change', () => {
      const incoming = Array.from(fileInput.files), errors = [], valid = [];
      for (const f of incoming) {
        if (selectedFiles.length + valid.length >= MAX_FILES) {
          errors.push(`Max ${MAX_FILES} files allowed.`); break;
        }
        if (f.size > MAX_SIZE) { errors.push(`"${f.name}" exceeds 5 MB.`); continue; }
        valid.push(f);
      }
      if (errors.length) showToast(errors[0]);
      selectedFiles.push(...valid); fileInput.value = ''; renderPreview(); toggleSend();
    });

    function renderPreview() {
      previewBar.innerHTML = ''; previewBar.style.display = selectedFiles.length ? 'flex' : 'none';
      selectedFiles.forEach((f, i) => {
        const chip = document.createElement('div'); chip.className = 'preview-chip';
        chip.innerHTML = `${fileIcon(f.name)}<span>${truncate(f.name, 22)}</span>
                         <button onclick="removeFile(${i})">✕</button>`;
        previewBar.appendChild(chip);
      });
    }

    function removeFile(i) { selectedFiles.splice(i, 1); renderPreview(); toggleSend(); }
    function toggleSend()  { sendBtn.disabled = !(msgInput.value.trim() || selectedFiles.length); }

    sendBtn.addEventListener('click', trySend);

    async function trySend() {
      const text = msgInput.value.trim(), files = [...selectedFiles];
      if (!text && !files.length) return;
      appendMsg('user', text, files.map(f => f.name));
      msgInput.value = ''; msgInput.style.height = 'auto';
      selectedFiles = []; renderPreview(); toggleSend();
      if (files.length) await uploadFiles(files);
      else if (text) setTimeout(() => appendMsg('system', `Echo: "${text}"`), 400);
    }

    async function uploadFiles(files) {
      const fd = new FormData(); files.forEach(f => fd.append('files', f));
      const el = appendMsg('system', '⏳ Uploading…');
      try {
        const res = await fetch(API_URL, { method: 'POST', body: fd });
        const data = await res.json();
        el.querySelector('.bubble').innerHTML = res.ok
          ? `✅ Uploaded: ${data.files.map(n => `<strong>${truncate(n, 30)}</strong>`).join(', ')}`
          : `❌ ${data.detail || 'Upload failed.'}`;
      } catch (err) {
        el.querySelector('.bubble').textContent = `❌ Network error: ${err.message}`;
      }
    }

    voiceBtn.addEventListener('click', () => {
      isRecording = !isRecording;
      voiceBtn.classList.toggle('recording', isRecording);
      showToast(isRecording ? '🎙 Recording… (not yet implemented)' : 'Recording stopped.');
    });

    function appendMsg(role, text = '', fileNames = []) {
      const wrap = document.createElement('div'); wrap.className = `msg ${role}`;
      let html = text ? `<span>${escHtml(text)}</span>` : '';
      if (fileNames.length)
        html += `<div class="file-chips">${fileNames.map(n =>
          `<span class="chip">${fileIcon(n)}${truncate(n, 24)}</span>`).join('')}</div>`;
      wrap.innerHTML = `<div class="bubble">${html}</div>`;
      chatWindow.appendChild(wrap); chatWindow.scrollTop = chatWindow.scrollHeight; return wrap;
    }

    function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = { pdf:'📄',png:'🖼',jpg:'🖼',jpeg:'🖼',gif:'🖼',webp:'🖼',
                    mp4:'🎬',mov:'🎬',mp3:'🎵',wav:'🎵',zip:'🗜',
                    csv:'📊',xls:'📊',xlsx:'📊',doc:'📝',docx:'📝' };
      return `<span>${map[ext] || '📎'}</span>`;
    }

    function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
