services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: voicerag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (optional but recommended)
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__WAL__ENABLED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  postgres:
    image: postgres:16
    container_name: voicerag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  voicerag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicerag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override hosts to use Docker service names instead of localhost
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432          # internal Docker port, not 5433
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./tmp:/app/tmp             # persist uploaded files
      - ./logs:/app/logs           # persist logs
      - ./static:/app/static       # serve UI
    depends_on:
      postgres:
        condition: service_healthy  # wait until postgres is truly ready
      qdrant:
        condition: service_healthy  # wait until qdrant is truly ready
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data: